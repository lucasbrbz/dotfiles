# backend = "glx";
backend = "xrender";
# vsync = true;
vsync = false;

inactive-opacity = 0.7;
corner-radius = 15;

rounded-corners-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'dmenu'",
    "class_g = 'Bspwm'"
];

focus-exclude = [
    "class_g = 'i3lock'",
    "class_g = 'dmenu'"
];

# recommended extras
round-borders = 1;
detect-rounded-corners = true;
detect-client-opacity = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-damage = true;